<!-- 이미지 업로드 모달 템플릿 -->
<template id="imageUploadTemplate">
    <div class="modal-overlay">
        <div class="modal-content p-3">
            <!-- 닫기 버튼 -->
            <button type="button" data-action="close"
                    class="absolute top-2 right-2 flex items-center justify-center w-6 h-6 rounded-full hover:bg-gray-100 transition-colors"
                    title="Cancel">
                <span class="material-symbols-outlined text-gray-500" style="font-size: 14px;">close</span>
            </button>

            <!-- 입력 폼 -->
            <div class="space-y-2">
                <!-- URL 입력 -->
                <div>
                    <label class="block text-[13px] font-medium text-gray-700 mb-1">
                        Image URL
                    </label>
                    <input type="url" 
                           placeholder="https://" 
                           class="w-full px-2 py-0.5 text-[13px] border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-gray-400">
                </div>

                <!-- 파일 업로드 -->
                <div>
                    <label class="block text-[13px] font-medium text-gray-700 mb-1">
                        Image File
                    </label>
                    <div class="flex items-center justify-center w-full">
                        <label class="w-full flex flex-col items-center px-3 py-2 bg-white text-gray-500 rounded-lg border-2 border-gray-300 border-dashed cursor-pointer hover:bg-gray-50">
                            <span class="material-symbols-outlined text-sm mb-0.5 text-gray-500" style="font-size: 14px;">add_photo_alternate</span>
                            <span class="text-[11px]">Select a File</span>
                            <input type="file" class="hidden" accept="image/*">
                        </label>
                    </div>
                </div>
            </div>

            <!-- 버튼 영역 -->
            <div class="flex justify-end items-center space-x-1.5 mt-2">
                <button type="submit"
                        class="flex items-center justify-center w-6 h-6 rounded-full hover:bg-gray-100 transition-colors"
                        title="Insert">
                        
                    <span class="material-symbols-outlined" style="font-size: 14px;">add_circle</span>
                </button>
            </div>
        </div>
    </div>
</template>

<!-- Google Material Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
